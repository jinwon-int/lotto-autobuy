name: Lotto 6/45 Auto Buy

on:
  schedule:
    # GitHub Actions cron runs in UTC. 09:00 UTC = 18:00 KST (KST = UTC+9).
    # Saturday 18:00 KST is before sales close (20:00 KST) and the draw (~20:35 KST).
    - cron: '0 9 * * 6'  # Every Saturday 18:00 KST
  workflow_dispatch:     # Allow manual trigger for testing

jobs:
  buy-lotto:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dhapi
        run: pip install dhapi

      - name: Set up credentials
        env:
          DH_ID: ${{ secrets.DH_ID }}
          DH_PW: ${{ secrets.DH_PW }}
        run: |
          mkdir -p ~/.dhapi
          python3 -c "
          import os
          uid = os.environ['DH_ID']
          pw = os.environ['DH_PW']
          toml = f'[default]\\nusername = \"{uid}\"\\npassword = \"{pw}\"\\n'
          with open(os.path.expanduser('~/.dhapi/credentials'), 'w') as f:
              f.write(toml)
          "
          chmod 600 ~/.dhapi/credentials

      - name: Buy Lotto 6/45 (Hot Number Strategy)
        id: purchase
        env:
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
        run: |
          echo "=== Lotto 6/45 — Hot Number Strategy ==="
          echo "Based on top-6 most frequent numbers (1,228 draws)"
          echo ""

          if [ "$DRY_RUN" = "true" ]; then
            echo "[DRY RUN] Would buy 5 games with hot-number strategy"
            echo "Set DRY_RUN=false in repo variables to enable real purchase"
            echo "dry_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Strategy: TOP 6 numbers (34,27,13,12,45,18) with variations
          # Game A: TOP 6 exactly
          echo "--- Game A: TOP 6 ---"
          dhapi buy-lotto645 -m manual -n "34,27,13,12,45,18" -g 1 -y 2>&1

          # Game B: swap 18→33 (next top number)
          echo "--- Game B: 18→33 ---"
          dhapi buy-lotto645 -m manual -n "34,27,13,12,45,33" -g 1 -y 2>&1

          # Game C: swap 45→40 (next tier)
          echo "--- Game C: 45→40 ---"
          dhapi buy-lotto645 -m manual -n "34,27,13,12,40,18" -g 1 -y 2>&1

          # Game D: hot+cold mix (keep 34,27,45,18; add cold 9,22)
          echo "--- Game D: Hot+Cold Mix ---"
          dhapi buy-lotto645 -m manual -n "34,27,9,22,45,18" -g 1 -y 2>&1

          # Game E: full random for diversity
          echo "--- Game E: Random ---"
          dhapi buy-lotto645 -m auto -g 1 -y 2>&1

          echo ""
          echo "=== All 5 games purchased ==="
          echo "dry_run=false" >> $GITHUB_OUTPUT

      - name: Notify via Webhook
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK }}
          WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          DRY_RUN: ${{ steps.purchase.outputs.dry_run || 'true' }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No webhook URL configured, skipping notification"
            exit 0
          fi

          python3 -c "
          import os, json, hmac, hashlib, urllib.request

          dry_run = os.environ.get('DRY_RUN', 'true')
          status = os.environ.get('JOB_STATUS', 'unknown')

          if dry_run == 'true':
              msg = '🧪 [Lotto AutoBuy] DRY RUN — Hot Number Strategy'
          elif status == 'success':
              msg = '🎰 [Lotto AutoBuy] 5-game purchase complete!'
          else:
              msg = f'❌ [Lotto AutoBuy] Purchase failed (status: {status})'

          payload = json.dumps({
              'message': msg,
              'status': 'success' if status == 'success' else 'error',
              'data': {
                  'strategy': 'hot-number-top6',
                  'games': ['34,27,13,12,45,18', '34,27,13,12,45,33', '34,27,13,12,40,18', '34,27,9,22,45,18', 'auto'],
                  'dry_run': dry_run == 'true'
              }
          }).encode()

          secret = os.environ['WEBHOOK_SECRET'].encode()
          sig = hmac.new(secret, payload, hashlib.sha256).hexdigest()

          req = urllib.request.Request(
              os.environ['WEBHOOK_URL'],
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'X-Hub-Signature-256': f'sha256={sig}',
                  'User-Agent': 'Mozilla/5.0 (GitHub Actions Lotto AutoBuy)'
              },
              method='POST'
          )
          resp = urllib.request.urlopen(req, timeout=15)
          print(f'Webhook response: {resp.status} {resp.read().decode()}')
          "
