name: Lotto 6/45 Auto Buy [DEPRECATED — now handled by 대교 cronjob]

# ⚠️ This GitHub Actions workflow is DEPRECATED as of 2026-06-19.
# Purchase is now handled directly by 대교 (Seo S23 Ultra) via Hermes cronjob.
# This workflow is kept for reference / manual fallback only.
# The schedule trigger is disabled (commented out).

on:
  #schedule:
  #  - cron: '0 9 * * 6'  # DISABLED: 대교 handles this now
  workflow_dispatch:     # Manual trigger for emergency fallback

jobs:
  buy-lotto:
    runs-on: ubuntu-latest
    env:
      LOTTO_STATE_FILE: ${{ runner.temp }}/lotto-last-purchase.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dhapi

      - name: Set up dhapi credentials
        env:
          DH_ID: ${{ secrets.DH_ID }}
          DH_PW: ${{ secrets.DH_PW }}
        run: |
          mkdir -p ~/.dhapi
          python3 -c "
          import os
          uid = os.environ['DH_ID']
          pw = os.environ['DH_PW']
          toml = f'[default]\nusername = "{uid}"\npassword = "{pw}"\n'
          with open(os.path.expanduser('~/.dhapi/credentials'), 'w') as f:
              f.write(toml)
          "
          chmod 600 ~/.dhapi/credentials

      - name: Buy Lotto 6/45 (Strategy C v2 dynamic)
        id: purchase
        env:
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          HERMES_WEBHOOK: ""
        run: |
          echo "=== Lotto 6/45 — Strategy C v2 dynamic anti-crowd ==="
          python lotto_buy.py
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          state_file = os.environ['LOTTO_STATE_FILE']
          with open(state_file, encoding='utf-8') as f:
              state = json.load(f)
          status = state.get('status', 'unknown')
          print(f"dry_run={'false' if status == 'purchased' else 'true'}")
          print(f"purchase_status={status}")
          print(f"state_file={state_file}")
          PY
          echo "=== Purchase state ==="
          cat "$LOTTO_STATE_FILE"

      - name: Notify via Webhook
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK }}
          WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          DRY_RUN: ${{ steps.purchase.outputs.dry_run || 'true' }}
          STATE_FILE: ${{ steps.purchase.outputs.state_file }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No webhook URL configured, skipping notification"
            exit 0
          fi

          python3 -c "
          import os, json, hmac, hashlib, urllib.request

          dry_run = os.environ.get('DRY_RUN', 'true')
          status = os.environ.get('JOB_STATUS', 'unknown')
          state_file = os.environ.get('STATE_FILE')
          state = {}
          if state_file and os.path.exists(state_file):
              with open(state_file) as f:
                  state = json.load(f)

          if dry_run == 'true':
              msg = '🧪 [Lotto AutoBuy] DRY RUN — Strategy C v2 dynamic'
          elif status == 'success':
              msg = '🎰 [Lotto AutoBuy] Strategy C v2 purchase complete!'
          else:
              msg = f'❌ [Lotto AutoBuy] Purchase failed (status: {status})'

          payload = json.dumps({
              'message': msg,
              'status': 'success' if status == 'success' else 'error',
              'data': {
                  'strategy': state.get('strategy', 'strategy-c-v2-dynamic-anti-crowd'),
                  'draw_no': state.get('draw_no'),
                  'numbers': state.get('games', []),
                  'games': len(state.get('games', [])),
                  'note': '회차별 anti-crowd 5조합 생성 + state 저장',
                  'dry_run': dry_run == 'true'
              }
          }).encode()

          secret = os.environ['WEBHOOK_SECRET'].encode()
          sig = hmac.new(secret, payload, hashlib.sha256).hexdigest()

          req = urllib.request.Request(
              os.environ['WEBHOOK_URL'],
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'X-Hub-Signature-256': f'sha256={sig}',
                  'User-Agent': 'Mozilla/5.0 (GitHub Actions Lotto AutoBuy)'
              },
              method='POST'
          )
          resp = urllib.request.urlopen(req, timeout=15)
          print(f'Webhook response: {resp.status} {resp.read().decode()}')
          "
