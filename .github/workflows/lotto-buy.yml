name: Lotto 6/45 Auto Buy

on:
  schedule:
    # GitHub Actions cron runs in UTC. 09:00 UTC = 18:00 KST (KST = UTC+9).
    # Saturday 18:00 KST is before sales close (20:00 KST) and the draw (~20:35 KST).
    - cron: '0 9 * * 6'  # Every Saturday 18:00 KST
  workflow_dispatch:     # Allow manual trigger for testing

jobs:
  buy-lotto:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dhapi
        run: pip install dhapi

      - name: Set up credentials
        env:
          DH_ID: ${{ secrets.DH_ID }}
          DH_PW: ${{ secrets.DH_PW }}
        run: |
          mkdir -p ~/.dhapi
          python3 -c "
          import os
          uid = os.environ['DH_ID']
          pw = os.environ['DH_PW']
          toml = f'[default]\\nusername = \"{uid}\"\\npassword = \"{pw}\"\\n'
          with open(os.path.expanduser('~/.dhapi/credentials'), 'w') as f:
              f.write(toml)
          "
          chmod 600 ~/.dhapi/credentials

      - name: Buy Lotto 6/45
        env:
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "[DRY RUN] Would run: dhapi buy-lotto645 -y"
            echo "Set DRY_RUN=false in repo variables to enable real purchase"
            exit 0
          fi
          dhapi buy-lotto645 -y

      - name: Notify via Hermes
        if: always()
        run: |
          echo "Purchase completed. Check logs for details."
