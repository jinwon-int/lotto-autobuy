name: Lotto 6/45 Auto Buy [DEPRECATED — now handled by 대교 cronjob]

# ⚠️ This GitHub Actions workflow is DEPRECATED as of 2026-06-19.
# Purchase is now handled directly by 대교 (Seo S23 Ultra) via Hermes cronjob.
# This workflow is kept for reference / manual fallback only.
# The schedule trigger is disabled (commented out).

on:
  #schedule:
  #  - cron: '0 9 * * 6'  # DISABLED: 대교 handles this now
  workflow_dispatch:     # Manual trigger for emergency fallback

jobs:
  buy-lotto:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dhapi
        run: pip install dhapi

      - name: Set up credentials
        env:
          DH_ID: ${{ secrets.DH_ID }}
          DH_PW: ${{ secrets.DH_PW }}
        run: |
          mkdir -p ~/.dhapi
          python3 -c "
          import os
          uid = os.environ['DH_ID']
          pw = os.environ['DH_PW']
          toml = f'[default]\nusername = "{uid}"\npassword = "{pw}"\n'
          with open(os.path.expanduser('~/.dhapi/credentials'), 'w') as f:
              f.write(toml)
          "
          chmod 600 ~/.dhapi/credentials

      - name: Buy Lotto 6/45 (Strategy C diversified)
        id: purchase
        env:
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
        run: |
          echo "=== Lotto 6/45 — Strategy C diversified anti-crowd ==="
          echo "게임 1: 2,19,31,33,40,44"
          echo "게임 2: 5,21,28,35,39,43"
          echo "게임 3: 8,23,30,32,37,42"
          echo "게임 4: 10,24,29,36,38,41"
          echo "게임 5: 14,20,26,33,39,44"
          echo "근거: TOP6/인기번호 몰빵의 공동당첨 분할 리스크 회피 + 1등 도달 확률 5배"
          echo ""

          if [ "$DRY_RUN" = "true" ]; then
            echo "[DRY RUN] Would buy Strategy C diversified 5 games"
            echo "Set DRY_RUN=false in repo variables to enable real purchase"
            echo "dry_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          dhapi buy-lotto645 \
            '2,19,31,33,40,44' \
            '5,21,28,35,39,43' \
            '8,23,30,32,37,42' \
            '10,24,29,36,38,41' \
            '14,20,26,33,39,44' \
            -y 2>&1
          echo "=== Strategy C 5게임 구매 완료 ==="
          echo "dry_run=false" >> $GITHUB_OUTPUT

      - name: Notify via Webhook
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK }}
          WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          DRY_RUN: ${{ steps.purchase.outputs.dry_run || 'true' }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No webhook URL configured, skipping notification"
            exit 0
          fi

          python3 -c "
          import os, json, hmac, hashlib, urllib.request

          dry_run = os.environ.get('DRY_RUN', 'true')
          status = os.environ.get('JOB_STATUS', 'unknown')

          if dry_run == 'true':
              msg = '🧪 [Lotto AutoBuy] DRY RUN — Strategy C diversified'
          elif status == 'success':
              msg = '🎰 [Lotto AutoBuy] Strategy C 5-game purchase complete!'
          else:
              msg = f'❌ [Lotto AutoBuy] Purchase failed (status: {status})'

          payload = json.dumps({
              'message': msg,
              'status': 'success' if status == 'success' else 'error',
              'data': {
                  'strategy': 'strategy-c-anti-crowd-diversified',
                  'numbers': [
                      '2,19,31,33,40,44',
                      '5,21,28,35,39,43',
                      '8,23,30,32,37,42',
                      '10,24,29,36,38,41',
                      '14,20,26,33,39,44',
                  ],
                  'games': 5,
                  'note': 'TOP6/인기번호 몰빵의 공동당첨 분할 리스크 회피 + 1등 도달 확률 5배',
                  'dry_run': dry_run == 'true'
              }
          }).encode()

          secret = os.environ['WEBHOOK_SECRET'].encode()
          sig = hmac.new(secret, payload, hashlib.sha256).hexdigest()

          req = urllib.request.Request(
              os.environ['WEBHOOK_URL'],
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'X-Hub-Signature-256': f'sha256={sig}',
                  'User-Agent': 'Mozilla/5.0 (GitHub Actions Lotto AutoBuy)'
              },
              method='POST'
          )
          resp = urllib.request.urlopen(req, timeout=15)
          print(f'Webhook response: {resp.status} {resp.read().decode()}')
          "
