name: Lotto 6/45 Auto Buy

on:
  schedule:
    # GitHub Actions cron runs in UTC. 09:00 UTC = 18:00 KST (KST = UTC+9).
    # Saturday 18:00 KST is before sales close (20:00 KST) and the draw (~20:35 KST).
    - cron: '0 9 * * 6'  # Every Saturday 18:00 KST
  workflow_dispatch:     # Allow manual trigger for testing

jobs:
  buy-lotto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Auto Buy
        env:
          DH_ID: ${{ secrets.DH_ID }}
          DH_PW: ${{ secrets.DH_PW }}
          HERMES_WEBHOOK: ${{ secrets.HERMES_WEBHOOK }}
          # DRY_RUN is non-sensitive config; use a repository variable, not a secret.
          # Set vars.DRY_RUN to 'false' to enable real purchases. Defaults to 'true' (safe).
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
        run: python lotto_buy.py

      - name: Notify via Hermes
        if: always()
        run: |
          echo "Purchase completed. Check logs for details."
