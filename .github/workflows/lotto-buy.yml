name: Lotto 6/45 Auto Buy

on:
  schedule:
    # GitHub Actions cron runs in UTC. 09:00 UTC = 18:00 KST (KST = UTC+9).
    # Saturday 18:00 KST is before sales close (20:00 KST) and the draw (~20:35 KST).
    - cron: '0 9 * * 6'  # Every Saturday 18:00 KST
  workflow_dispatch:     # Allow manual trigger for testing

jobs:
  buy-lotto:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dhapi
        run: pip install dhapi

      - name: Set up credentials
        env:
          DH_ID: ${{ secrets.DH_ID }}
          DH_PW: ${{ secrets.DH_PW }}
        run: |
          mkdir -p ~/.dhapi
          python3 -c "
          import os
          uid = os.environ['DH_ID']
          pw = os.environ['DH_PW']
          toml = f'[default]\\nusername = \"{uid}\"\\npassword = \"{pw}\"\\n'
          with open(os.path.expanduser('~/.dhapi/credentials'), 'w') as f:
              f.write(toml)
          "
          chmod 600 ~/.dhapi/credentials

      - name: Buy Lotto 6/45
        id: purchase
        env:
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "[DRY RUN] Would run: dhapi buy-lotto645 -y"
            echo "Set DRY_RUN=false in repo variables to enable real purchase"
            echo "dry_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          dhapi buy-lotto645 -y 2>&1 | tee /tmp/lotto-result.txt
          echo "dry_run=false" >> $GITHUB_OUTPUT

      - name: Notify via Webhook
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.HERMES_WEBHOOK }}
          WEBHOOK_SECRET: ${{ secrets.HERMES_WEBHOOK_SECRET }}
          DRY_RUN: ${{ steps.purchase.outputs.dry_run || 'true' }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No webhook URL configured, skipping notification"
            exit 0
          fi

          RESULT=$(cat /tmp/lotto-result.txt 2>/dev/null || echo "Purchase completed")
          STATUS="${{ job.status }}"

          python3 -c "
          import os, json, hmac, hashlib, urllib.request

          result = os.environ.get('RESULT', 'Purchase completed').strip()
          dry_run = os.environ.get('DRY_RUN', 'true')

          payload = json.dumps({
              'message': f'[Lotto AutoBuy] {\"DRY RUN\" if dry_run == \"true\" else \"Purchase complete\"}',
              'status': 'success',
              'data': {
                  'result': result[-500:],
                  'dry_run': dry_run == 'true'
              }
          }).encode()

          secret = os.environ['WEBHOOK_SECRET'].encode()
          sig = hmac.new(secret, payload, hashlib.sha256).hexdigest()

          req = urllib.request.Request(
              os.environ['WEBHOOK_URL'],
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'X-Hub-Signature-256': f'sha256={sig}',
                  'User-Agent': 'Mozilla/5.0 (GitHub Actions Lotto AutoBuy)'
              },
              method='POST'
          )
          resp = urllib.request.urlopen(req, timeout=15)
          print(f'Webhook response: {resp.status} {resp.read().decode()}')
          "
